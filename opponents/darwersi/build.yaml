# Darwersi engine — build and run configuration.
# Add entries to coach.yaml for the strength levels you want to offer.
#
# Named variant progression (gradually stronger):
#   amoeba:  d=4,  ES=60  (near-pure static eval, ~800 nodes/move)
#   worm:    d=6,  ES=50  (shallow search, ~20K nodes/move)
#   rodent:  d=10, ES=44  (competent, ~300K nodes/move) — default
#   octopus: d=14, ES=36  (deep search, early endgame, ~2M nodes/move)
#
# Version scheme: d<max-depth>-es<end-search-ply>
# Name scheme:   darwersi-<strength-tier>
#
# Example coach.yaml entries:

# - name: "darwersi-amoeba"
#   version: "d4-es60"
#   run: "path/to/darwersi-gtp --name darwersi-amoeba --max-depth 6 --end-search 60"
#   cores: 1; memory_mb: 8; max_concurrency: 4

# - name: "darwersi-worm"
#   version: "d6-es50"
#   run: "path/to/darwersi-gtp --name darwersi-worm --max-depth 6 --end-search 50"
#   cores: 1; memory_mb: 8; max_concurrency: 4

# - name: "darwersi-rodent"
#   version: "d10-es44"
#   run: "path/to/darwersi-gtp --name darwersi-rodent --max-depth 10 --end-search 44"
#   cores: 1; memory_mb: 8; max_concurrency: 4

# - name: "darwersi-octopus"
#   version: "d14-es36"
#   run: "path/to/darwersi-gtp --name darwersi-octopus --max-depth 14 --end-search 36"
#   cores: 1; memory_mb: 8; max_concurrency: 4

# Base (no tier, default d10-es44):
name: "darwersi"
version: "d10-es44"
build: "cd darwersi/Arena && make"
run: "darwersi/Arena/darwersi-gtp"
cores: 1
memory_mb: 8
max_concurrency: 4
